<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2K26 Sim League - Create Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>NBA 2K26 Simulation League</h1>
      <p>Create your custom player and save to your roster.</p>
    </header>

    <section class="card">
      <h2>Create Player</h2>
      <form id="player-form" autocomplete="off">
        <label for="name">Player Name</label>
        <input type="text" id="name" name="name" required maxlength="32" />

        <label for="position">Position</label>
        <select id="position" name="position" required>
          <option value="">--Select Position--</option>
          <option value="Point Guard">Point Guard</option>
          <option value="Shooting Guard">Shooting Guard</option>
          <option value="Small Forward">Small Forward</option>
          <option value="Power Forward">Power Forward</option>
          <option value="Center">Center</option>
        </select>

        <div class="stat-grid">
          <div>
            <label for="athletics">Athletics</label>
            <input type="number" id="athletics" name="athletics" min="1" max="99" value="50" required />
          </div>
          <div>
            <label for="shooting">Shooting</label>
            <input type="number" id="shooting" name="shooting" min="1" max="99" value="50" required />
          </div>
          <div>
            <label for="playmaking">Playmaking</label>
            <input type="number" id="playmaking" name="playmaking" min="1" max="99" value="50" required />
          </div>
          <div>
            <label for="defense">Defense</label>
            <input type="number" id="defense" name="defense" min="1" max="99" value="50" required />
          </div>
          <div>
            <label for="rebounds">Rebounds</label>
            <input type="number" id="rebounds" name="rebounds" min="1" max="99" value="50" required />
          </div>
        </div>

        <label for="description">Backstory</label>
        <textarea id="description" name="description" rows="3" maxlength="280" placeholder="A short player backstory (optional)"></textarea>

        <button type="submit">Save Player</button>
      </form>
    </section>

    <section class="card">
      <h2>Roster</h2>
      <p id="roster-empty">No players yet. Add a player to see them here.</p>
      <ul id="roster-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
